<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Profile Switcher</title>
  <style>
    body {
      font-family: "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 15px;
      background: #666e71;
      color: #333;
      width: 250px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
      text-align: center;
      color: white;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #424749;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background: #424749;
      transform: scale(1.02);
    }

    button:active {
      background: black;
      transform: scale(0.98);
    }

    footer {
      margin-top: 15px;
      font-size: 12px;
      text-align: center;
      color: white;
    }
  </style>
</head>
<body>
  <h2>Profiles</h2>
  <ul id="profiles"></ul>
  <footer>Choose a profile to launch</footer>
  <script src="popup.js"></script>
</body>
</html>
